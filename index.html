<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
<link rel="stylesheet" href="./styles/output.css" />

<title>Cardápio Digital</title>
</head>

<body class="bg-zinc-100">

<!-- HEADER CORRIGIDO -->
<header class="relative w-full h-[410px] bg-zinc-900 overflow-hidden">

    <!-- IMAGEM DE FUNDO -->
    <div class="absolute inset-0">
        <img src="./assets/back.jpg"
             class="w-full h-full object-cover" />
    </div>

    <!-- ESCURECER FUNDO -->
    <div class="absolute inset-0 bg-black/60"></div>

    <!-- CONTEÚDO -->
    <div class="relative z-10 w-full h-full flex flex-col justify-center items-center">

        <img src="./assets/hamb-1.png"
             alt="Logo da loja"
             class="w-32 h-32 rounded-full shadow-lg hover:scale-110 duration-200" />

        <h1 class="text-2xl mt-4 mb-2 font-bold text-white">NOME DA LOJA</h1>

        <span class="text-white text-xs">NOME DA RUA</span>

        <div class="px-4 py-1 rounded-lg mt-5" id="date-span">
            <span class="text-white text-base">
                Seg à Dom • 07:00 às 00:00
            </span>
        </div>

    </div>
</header>

<!-- TÍTULO -->
<h2 class="text-2xl md:text-5xl font-bold text-center mt-9 mb-6">MENU</h2>

<!-- LISTA DE PRODUTOS -->
<main id="menu" class="grid grid-cols-1 md:grid-cols-2 gap-7 md:gap-10 mx-auto max-w-7xl px-2 mb-24">

    <!-- PRODUTOS (SEM MUDANÇA) -->
    <div class="flex gap-2">
        <img src="./assets/hamb-8.png" class="w-28 h-28 rounded-md hover:scale-110 hover:-rotate-2 duration-300">

        <div>
            <p class="font-bold">Nome do produto 1</p>
            <p class="text-sm">Descrição do produto</p>

            <div class="flex items-center justify-between mt-3">
                <p class="font-bold text-lg">R$ 10,00</p>

                <button class="bg-gray-900 px-3 rounded add-to-cart-btn"
                        data-name="Nome do produto 1" data-price="10.00">
                    <i class="fa fa-cart-plus text-lg text-white"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- resto igual (não mexi pra não quebrar seu projeto) -->

</main>

<!-- MODAIS E CARRINHO (SEM ALTERAÇÃO) -->
<!-- tudo igual ao seu código original -->

<script src="script.js"></script>

</body>
</html>
