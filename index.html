<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
<link rel="stylesheet" href="./styles/output.css"/>

<title>Cardápio Digital</title>
</head>

<body class="bg-zinc-100">

<h1 class="text-center text-3xl font-bold mt-6">Cardápio</h1>

<main class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto p-4">

    <!-- PRODUTO -->
    <div class="flex gap-3 items-center">
        <img src="./assets/hamb-1.png" class="w-24 h-24 rounded-md"/>

        <div>
            <p class="font-bold">X-Burguer</p>
            <p>R$ 22,00</p>

            <button class="add-to-cart-btn bg-black text-white px-4 py-1 rounded mt-2"
                data-name="X-Burguer"
                data-price="22">
                Adicionar
            </button>
        </div>
    </div>

    <div class="flex gap-3 items-center">
        <img src="./assets/refri-1.png" class="w-24 h-24 rounded-md"/>

        <div>
            <p class="font-bold">Coca-Cola</p>
            <p>R$ 6,00</p>

            <button class="add-to-cart-btn bg-black text-white px-4 py-1 rounded mt-2"
                data-name="Coca-Cola"
                data-price="6">
                Adicionar
            </button>
        </div>
    </div>

</main>

<!-- CARRINHO -->
<div id="cart-modal"
     class="hidden fixed inset-0 bg-black/60 items-center justify-center">

    <div class="bg-white p-5 w-[90%] max-w-[500px] rounded">

        <h2 class="text-xl font-bold text-center">Carrinho</h2>

        <div id="cart-items" class="mt-4 flex flex-col gap-3"></div>

        <p class="mt-4 font-bold">Total: R$ <span id="cart-total">0.00</span></p>

        <button id="close-modal-btn" class="mt-4 bg-red-500 text-white px-4 py-2 rounded w-full">
            Fechar
        </button>

    </div>
</div>

<!-- BOTÃO CARRINHO -->
<div class="fixed bottom-0 w-full bg-red-500 text-white text-center p-3">
    <button id="cart-btn">Ver Carrinho (<span id="cart-count">0</span>)</button>
</div>

<script src="script.js"></script>

</body>
</html>
