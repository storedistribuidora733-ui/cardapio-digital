<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sua Loja</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}

.topo{
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

.container{
  padding:15px;
}

.produto{
  background:#fff;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

.botao{
  background:#111;
  color:#fff;
  padding:8px;
  margin-top:8px;
  display:inline-block;
  cursor:pointer;
  border-radius:5px;
}

.carrinho{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:red;
  color:white;
  padding:15px;
  text-align:center;
}
</style>

</head>

<body>

<div class="topo">
  <h1>SUA LOJA</h1>
</div>

<div class="container">

  <div class="produto">
    <h3>Hambúrguer</h3>
    <div class="preco">10.00</div>
    <div class="botao">Adicionar</div>
  </div>

  <div class="produto">
    <h3>Cheeseburguer</h3>
    <div class="preco">15.00</div>
    <div class="botao">Adicionar</div>
  </div>

  <div class="produto">
    <h3>Refrigerante</h3>
    <div class="preco">5.00</div>
    <div class="botao">Adicionar</div>
  </div>

</div>

<div class="carrinho">
  Carrinho: <span id="qtd">0</span>
  <button id="finalizar">WhatsApp</button>
</div>

<script src="script.js"></script>

</body>
</html>
