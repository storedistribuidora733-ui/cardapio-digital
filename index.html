<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>
<link rel="stylesheet" href="./styles/output.css"/>

<title>Cardápio Digital</title>
</head>

<body class="bg-zinc-100">

<!-- HEADER -->
<header class="w-full h-[420px] bg-zinc-900 bg-home bg-cover bg-center">
    <div class="w-full h-full flex flex-col justify-center items-center">

        <img src="./assets/hamb-1.png"
             class="w-32 h-32 rounded-full shadow-lg hover:scale-110 duration-200"/>

        <h1 class="text-3xl mt-4 mb-2 font-bold text-white">SUA LOJA</h1>
        <span class="text-white font-medium">SEU ENDEREÇO</span>

        <div class="bg-green-600 px-4 py-1 rounded-lg mt-5">
            <span class="text-white font-medium">Seg à Dom 18:00 às 22:00</span>
        </div>

    </div>
</header>

<h2 class="text-2xl md:text-5xl font-bold text-center mt-9 mb-6">
    conheça nosso menu
</h2>

<!-- MENU -->
<main id="menu" class="grid grid-cols-1 md:grid-cols-2 gap-7 md:gap-10 mx-auto max-w-7xl px-2 mb-20">

    <!-- PRODUTO -->
    <div class="flex gap-2">
        <img src="./assets/hamb-1.png" class="w-28 h-28 rounded-md"/>
        <div>
            <p class="font-bold">X-Burguer</p>
            <p class="text-sm">Hambúrguer, queijo e molho.</p>

            <div class="flex justify-between mt-3">
                <p class="font-bold text-lg">R$ 22,00</p>
                <button class="bg-gray-900 px-5 rounded add-to-cart-btn"
                    data-name="X-Burguer"
                    data-price="22.00">
                    <i class="fa fa-cart-plus text-white"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- BEBIDA -->
    <h2 class="font-bold text-3xl text-center col-span-full mt-6">BEBIDAS</h2>

    <div class="flex gap-2">
        <img src="./assets/refri-1.png" class="w-28 h-28 rounded-md"/>
        <div>
            <p class="font-bold">Coca-Cola</p>

            <div class="flex justify-between mt-3">
                <p class="font-bold text-lg">R$ 6,00</p>
                <button class="bg-gray-900 px-5 rounded add-to-cart-btn"
                    data-name="Coca-Cola"
                    data-price="6.00">
                    <i class="fa fa-cart-plus text-white"></i>
                </button>
            </div>
        </div>
    </div>

</main>

<!-- MODAL CARRINHO -->
<div class="bg-black/60 w-full h-full fixed top-0 left-0 z-[99] hidden items-center justify-center" id="cart-modal">

    <div class="bg-white p-5 rounded-md min-w-[90%] md:min-w-[600px]">

        <h2 class="text-center font-bold text-2xl">Meu Carrinho</h2>

        <div id="cart-items" class="flex flex-col gap-2 my-4"></div>

        <p class="font-bold">Total: R$ <span id="cart-total">0.00</span></p>

        <p class="text-sm text-gray-600 mt-2">Taxa de entrega: R$ 5,00</p>

        <p class="font-bold mt-4">Endereço:</p>
        <input type="text" id="address"
            class="w-full border-2 p-1 rounded"
            placeholder="Digite seu endereço"/>

        <p class="text-red-500 hidden" id="address-warn">Digite seu endereço!</p>

        <div class="flex justify-between mt-5">
            <button id="close-modal-btn">Fechar</button>
            <button id="checkout-btn"
                class="bg-green-500 text-white px-4 py-2 rounded">
                Finalizar no WhatsApp
            </button>
        </div>

    </div>
</div>

<!-- BOTÃO CARRINHO -->
<footer class="w-full bg-red-500 py-3 fixed bottom-0 flex justify-center">
    <button id="cart-btn" class="text-white font-bold flex gap-2">
        (<span id="cart-count">0</span>) Ver carrinho
        <i class="fa fa-cart-plus"></i>
    </button>
</footer>

<!-- SCRIPT WHATSAPP + CARRINHO -->
<script>
const checkoutBtn = document.getElementById("checkout-btn");

checkoutBtn.addEventListener("click", () => {
    const address = document.getElementById("address").value;

    if (!address) {
        document.getElementById("address-warn").classList.remove("hidden");
        return;
    }

    const items = document.getElementById("cart-items").innerText;
    const total = document.getElementById("cart-total").innerText;

    const message =
`🛒 NOVO PEDIDO

${items}

💰 Total: R$ ${total}
🚚 Taxa de entrega: R$ 5,00

📍 Endereço: ${address}`;

    const phone = "5500000000000"; // TROCAR DEPOIS
    const url = `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
});
</script>

<script src="script.js"></script>

</body>
</html>
